name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Verify, security scan, and native build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: graalvm/setup-graalvm@bef4b0e916c7dd079bf60fb95d49139f67e32c5f # v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Forbid wildcard imports
        run: |
          if grep -rEn 'import +(static +)?[a-zA-Z0-9_.]+\.\*;' --include='*.java' sail-core sail-infra sail-harness; then
            echo "::error::Wildcard imports are forbidden. Import each symbol explicitly."
            exit 1
          fi

      - name: Verify quality gates
        run: mvn clean verify

      - name: Upload coverage reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: jacoco-reports
          path: |
            **/target/site/jacoco
            **/target/site/jacoco.xml

      - name: Cache OWASP Dependency-Check data
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ runner.temp }}/dependency-check-data
          key: dependency-check-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}-${{ github.run_id }}
          restore-keys: |
            dependency-check-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}-
            dependency-check-${{ runner.os }}-

      - name: Scan dependencies
        run: >
          mvn install org.owasp:dependency-check-maven:12.1.8:aggregate
          -DskipTests
          -Djacoco.skip=true
          -Dformat=HTML
          -DfailBuildOnCVSS=7
          -DskipTestScope=true
          -DnvdApiKey=${{ secrets.NVD_API_KEY }}
          -DdataDirectory=${{ runner.temp }}/dependency-check-data

      - name: Upload dependency check reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: dependency-check-reports
          path: '**/target/dependency-check-report.html'

      - name: Build native image
        run: mvn package -Pnative -DskipTests

      - name: Smoke test
        run: ./sail-infra/target/sail -V
