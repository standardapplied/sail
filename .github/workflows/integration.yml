name: Integration (incus)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  incus-integration:
    name: Incus-backed integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: graalvm/setup-graalvm@bef4b0e916c7dd079bf60fb95d49139f67e32c5f # v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install and initialize incus
        run: |
          sudo apt-get update
          sudo apt-get install -y incus
          sudo incus admin init --minimal
          sudo chmod o+rw /var/lib/incus/unix.socket

      - name: Verify incus is reachable by the runner
        run: |
          which incus
          incus version
          incus list

      - name: Run incus integration tests
        run: mvn -B -Pintegration verify -Dsail.it.requireIncus=true
